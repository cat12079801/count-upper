version: 2
updates:
  # npm 依存
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # pnpm の minimumReleaseAge(3日)と揃え、公開直後の版でPRを出さない
    cooldown:
      default-days: 3
    groups:
      # メジャー以外はまとめて1PRにし、ノイズを抑える
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
    # 公開直後の action リリースを避ける
    cooldown:
      default-days: 3
