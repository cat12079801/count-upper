name: DB Migrate

# main へのマージで未適用マイグレーションを本番 Supabase へ自動適用する。
# 必要な Secrets: SUPABASE_ACCESS_TOKEN / SUPABASE_DB_PASSWORD
# Secrets 未設定の間はスキップし、CI を失敗させない。
on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

# 同時実行を防ぎ、適用順を保証する
concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: zssprbyaxjosxbkabsbt
    steps:
      - name: Check secrets configured
        id: guard
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "Supabase secrets not configured; skipping migration."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.ready == 'true'

      - uses: supabase/setup-cli@v1
        if: steps.guard.outputs.ready == 'true'
        with:
          version: latest

      - name: Link project
        if: steps.guard.outputs.ready == 'true'
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push migrations
        if: steps.guard.outputs.ready == 'true'
        run: supabase db push
